<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>법인세 요청자료 생성기</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- JSZip -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- FileSaver -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; border: 2px solid transparent; background-clip: padding-box; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; border: 2px solid transparent; background-clip: padding-box; }
        
        /* Animations */
        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .bounce-slight {
            animation: bounceSlight 2s infinite ease-in-out;
        }
        @keyframes bounceSlight {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50/50 min-h-screen text-slate-800 p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-10 text-center">
            <h1 class="text-3xl md:text-4xl font-extrabold flex items-center justify-center gap-3 mb-3">
                <div class="bg-white p-2.5 rounded-2xl shadow-sm border border-indigo-50">
                    <i class="ph-fill ph-folder-open text-indigo-600 text-3xl"></i>
                </div>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-700 to-blue-600">
                    법인세 요청자료 생성기
                </span>
            </h1>
            <p class="text-slate-500 font-medium text-sm md:text-base">필요한 자료 리스트를 구성하고 빈 폴더 구조로 압축(ZIP) 다운로드 하세요.</p>
        </header>

        <!-- Main Content Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8 items-start">
            
            <!-- Left Panel: Selected List -->
            <div class="bg-white rounded-3xl shadow-xl shadow-indigo-100/50 border border-slate-100 p-6 md:p-8 flex flex-col h-[650px] transition-all">
                <div class="flex justify-between items-center mb-5">
                    <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                        <i class="ph-fill ph-list-numbers text-indigo-500"></i>
                        요청 자료 리스트
                    </h2>
                    <span id="itemCount" class="bg-indigo-50 text-indigo-700 text-sm font-bold px-3 py-1 rounded-full border border-indigo-100">0개</span>
                </div>
                
                <div class="flex-1 overflow-y-auto pr-2 bg-slate-50/50 rounded-2xl border border-slate-100 p-3">
                    <ul id="selectedList" class="space-y-3">
                        <!-- List items will be injected here -->
                        <li id="emptyState" class="text-center text-slate-400 h-full flex flex-col items-center justify-center min-h-[400px]">
                            <div class="bg-white p-6 rounded-full shadow-sm border border-slate-100 mb-4 bounce-slight">
                                <i class="ph-duotone ph-folder-dashed text-5xl text-indigo-300"></i>
                            </div>
                            <p class="font-medium text-slate-500">오른쪽에서 항목을 추가해주세요.</p>
                            <p class="text-sm mt-1">추가된 항목이 이곳에 표시됩니다.</p>
                        </li>
                    </ul>
                </div>

                <div class="mt-6 pt-5 border-t border-slate-100">
                    <button id="generateBtn" class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-700 hover:to-blue-700 text-white font-bold py-4 px-4 rounded-2xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-indigo-200 hover:shadow-indigo-300 transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none disabled:shadow-none">
                        <i class="ph-bold ph-download-simple text-xl"></i>
                        <span class="text-lg">폴더 생성 및 ZIP 다운로드</span>
                    </button>
                </div>
            </div>

            <!-- Right Panel: Input & Examples -->
            <div class="bg-white rounded-3xl shadow-xl shadow-indigo-100/50 border border-slate-100 p-6 md:p-8 h-[650px] flex flex-col">
                <h2 class="text-xl font-bold text-slate-800 mb-5 flex items-center gap-2">
                    <i class="ph-fill ph-pencil-simple text-blue-500"></i>
                    자료 항목 추가
                </h2>
                
                <!-- Input Section -->
                <div class="flex gap-2 mb-6 bg-slate-50 p-2 rounded-2xl border border-slate-100 focus-within:ring-2 focus-within:ring-indigo-100 focus-within:border-indigo-300 transition-all">
                    <input type="text" id="itemInput" placeholder="요청할 자료명을 직접 입력하세요" 
                        class="flex-1 bg-transparent border-none px-3 py-2 text-slate-700 focus:outline-none placeholder-slate-400 font-medium">
                    <button id="addBtn" class="bg-slate-800 hover:bg-slate-900 text-white font-semibold py-2.5 px-6 rounded-xl transition-colors flex items-center gap-1.5 shrink-0 shadow-md">
                        <i class="ph-bold ph-plus text-lg"></i> 추가
                    </button>
                </div>

                <!-- Examples Section -->
                <div class="flex-1 flex flex-col overflow-hidden">
                    <div class="flex items-center gap-2 mb-4 px-1">
                        <div class="h-px flex-1 bg-slate-100"></div>
                        <h3 class="text-sm font-bold text-slate-400 flex items-center gap-1.5">
                            <i class="ph-fill ph-lightbulb text-yellow-400"></i>
                            자주 쓰는 항목 예시 (클릭하여 추가)
                        </h3>
                        <div class="h-px flex-1 bg-slate-100"></div>
                    </div>
                    
                    <div class="flex-1 overflow-y-auto pr-2 pb-2">
                        <ul id="exampleList" class="grid grid-cols-1 gap-2">
                            <!-- Example items will be injected here -->
                        </ul>
                    </div>
                </div>
            </div>

        </div>

        <!-- Bottom Panel: Result Viewer (Hidden by default) -->
        <div id="resultSection" class="mt-8 bg-gradient-to-r from-emerald-50 to-teal-50 border border-emerald-100 rounded-3xl p-6 md:p-8 hidden shadow-lg shadow-emerald-100/50 fade-in">
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-4">
                <div>
                    <h3 class="text-xl font-bold text-emerald-800 flex items-center gap-2">
                        <i class="ph-fill ph-check-circle text-2xl text-emerald-500"></i>
                        생성 완료 및 다운로드 시작!
                    </h3>
                    <p class="text-emerald-600 text-sm mt-1">성공적으로 아래의 폴더 구조를 가진 ZIP 파일이 만들어졌습니다.</p>
                </div>
            </div>
            
            <div class="bg-white/80 backdrop-blur-sm rounded-2xl border border-emerald-100/50 p-5 max-h-60 overflow-y-auto shadow-inner">
                <ul id="resultList" class="list-none space-y-2 text-slate-700 font-mono text-sm">
                    <!-- Result items will go here -->
                </ul>
            </div>
        </div>
    </div>

    <script>
        // State
        let selectedItems = [];

        // Default Examples
        const examples = [
            "법인등기사항전부증명서",
            "12월말일자 주주명부(연도중 주주명부 변경시 변경시점 모두 포함)",
            "자동차보험증권",
            "자동차등록증(자동차등록원부)",
            "금융거래확인서 및 원리금상환내역(대출상환)",
            "이자소득원천징수영수증",
            "기업부설연구소등록증",
            "연구개발인력현황(한국산업기술진흥협회)",
            "연구인력개발비체크리스트",
            "연구개발계획서 및 연구과제총괄표",
            "출자좌수증명원(건설업협회)",
            "네이버광고 충전 및 지출확인자료",
            "카카오광고 충전 및 지출확인자료"
        ];

        // DOM Elements
        const exampleListEl = document.getElementById('exampleList');
        const itemInputEl = document.getElementById('itemInput');
        const addBtnEl = document.getElementById('addBtn');
        const selectedListEl = document.getElementById('selectedList');
        const emptyStateEl = document.getElementById('emptyState');
        const itemCountEl = document.getElementById('itemCount');
        const generateBtnEl = document.getElementById('generateBtn');
        const resultSectionEl = document.getElementById('resultSection');
        const resultListEl = document.getElementById('resultList');

        // Initialize Examples
        function renderExamples() {
            examples.forEach(example => {
                const li = document.createElement('li');
                li.className = "group flex items-center cursor-pointer p-3.5 rounded-xl bg-white border border-slate-200 hover:border-indigo-300 hover:bg-indigo-50 hover:shadow-sm transition-all text-sm";
                
                const icon = document.createElement('div');
                icon.className = "w-6 h-6 rounded-full bg-slate-100 group-hover:bg-indigo-200 flex items-center justify-center mr-3 transition-colors shrink-0";
                icon.innerHTML = '<i class="ph-bold ph-plus text-slate-400 group-hover:text-indigo-600 text-xs"></i>';
                
                const span = document.createElement('span');
                span.className = "flex-1 text-slate-600 font-medium group-hover:text-indigo-900 transition-colors leading-snug";
                span.textContent = example;
                
                li.appendChild(icon);
                li.appendChild(span);
                
                // Click event: Move text to input and focus
                li.addEventListener('click', () => {
                    itemInputEl.value = example;
                    itemInputEl.focus();
                });
                
                exampleListEl.appendChild(li);
            });
        }

        // Render Left List
        function renderSelectedList(newItemAdded = false) {
            // Clear current list (except empty state which we manage separately)
            selectedListEl.innerHTML = '';
            
            if (selectedItems.length === 0) {
                selectedListEl.appendChild(emptyStateEl);
                emptyStateEl.style.display = 'flex';
                generateBtnEl.disabled = true;
            } else {
                emptyStateEl.style.display = 'none';
                generateBtnEl.disabled = false;
                
                selectedItems.forEach((item, index) => {
                    const li = document.createElement('li');
                    // Add fade-in animation only to the newest item if flagged
                    const animateClass = (newItemAdded && index === selectedItems.length - 1) ? 'fade-in' : '';
                    li.className = `flex items-center justify-between bg-white p-3.5 rounded-xl border border-slate-200 shadow-sm hover:shadow-md hover:border-indigo-200 gap-3 group transition-all ${animateClass}`;
                    
                    const textContainer = document.createElement('div');
                    textContainer.className = "flex items-center gap-3 flex-1 overflow-hidden";
                    
                    const numberSpan = document.createElement('span');
                    numberSpan.className = "flex items-center justify-center w-7 h-7 rounded-full bg-indigo-100 text-indigo-700 font-bold text-sm shrink-0";
                    numberSpan.textContent = index + 1;
                    
                    const textSpan = document.createElement('span');
                    textSpan.className = "text-slate-700 font-medium break-words w-full";
                    textSpan.textContent = item;
                    
                    textContainer.appendChild(numberSpan);
                    textContainer.appendChild(textSpan);
                    
                    // Delete Button
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = "text-slate-300 hover:text-red-500 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-red-50 transition-colors focus:outline-none shrink-0 opacity-50 group-hover:opacity-100";
                    deleteBtn.innerHTML = '<i class="ph-bold ph-trash text-lg"></i>';
                    deleteBtn.title = "삭제";
                    deleteBtn.onclick = () => removeItem(index);
                    
                    li.appendChild(textContainer);
                    li.appendChild(deleteBtn);
                    selectedListEl.appendChild(li);
                });
            }
            
            // Update count
            itemCountEl.textContent = `${selectedItems.length}개`;
        }

        // Add Item Logic
        function addItem() {
            const val = itemInputEl.value.trim();
            if (!val) return; // Do nothing if empty
            
            selectedItems.push(val);
            itemInputEl.value = ''; // Clear input
            itemInputEl.focus(); // Keep focus for continuous typing
            renderSelectedList(true); // Pass true to trigger animation on new item
            
            // Scroll to bottom of list
            setTimeout(() => {
                const listContainer = selectedListEl.parentElement;
                listContainer.scrollTop = listContainer.scrollHeight;
            }, 50);
        }

        // Remove Item Logic
        function removeItem(index) {
            selectedItems.splice(index, 1);
            renderSelectedList();
        }

        // Sanitize Folder Name (Remove invalid characters for Windows/Mac)
        function sanitizeFolderName(name) {
            return name.replace(/[<>:"/\\|?*]/g, '_');
        }

        // Generate Folders and ZIP
        async function generateZip() {
            if (selectedItems.length === 0) return;
            
            // UI Loading State
            const originalBtnContent = generateBtnEl.innerHTML;
            generateBtnEl.disabled = true;
            generateBtnEl.innerHTML = '<i class="ph-bold ph-spinner animate-spin text-xl"></i><span class="text-lg">압축 파일 생성 중...</span>';

            try {
                const zip = new JSZip();
                const folderNames = [];
                
                // Create folders in JSZip
                selectedItems.forEach((item, index) => {
                    const cleanName = sanitizeFolderName(item);
                    const folderName = `${index + 1}. ${cleanName}`;
                    zip.folder(folderName);
                    folderNames.push(folderName);
                });

                // Generate ZIP Blob
                const content = await zip.generateAsync({ type: "blob" });
                
                // Download file
                saveAs(content, "법인세_요청자료_폴더모음.zip");

                // Show Result Section at bottom
                resultListEl.innerHTML = '';
                folderNames.forEach(folder => {
                    const li = document.createElement('li');
                    li.className = "flex items-center gap-2 p-1.5 rounded bg-white border border-emerald-50";
                    li.innerHTML = `<i class="ph-fill ph-folder text-amber-400 text-lg"></i> <span class="font-medium text-slate-600">${folder}</span>`;
                    resultListEl.appendChild(li);
                });
                resultSectionEl.classList.remove('hidden');

                // Smooth scroll to results
                setTimeout(() => {
                    resultSectionEl.scrollIntoView({ behavior: 'smooth', block: 'end' });
                }, 100);

            } catch (error) {
                console.error("ZIP 생성 중 오류 발생:", error);
                alert("파일을 생성하는 중 오류가 발생했습니다.");
            } finally {
                // Restore Button State
                generateBtnEl.innerHTML = originalBtnContent;
                generateBtnEl.disabled = false;
            }
        }

        // Event Listeners
        addBtnEl.addEventListener('click', addItem);
        
        // Allow pressing Enter to add
        itemInputEl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addItem();
        });

        generateBtnEl.addEventListener('click', generateZip);

        // Initial Render
        renderExamples();
        renderSelectedList();

    </script>
</body>
</html>
