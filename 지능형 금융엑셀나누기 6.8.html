    UIRenderer.renderPhase5View = function(source) {
        const dataSets = source.phases.phase4.output?.length ? source.phases.phase4.output : source.phases.phase3.output;
        if (!dataSets || dataSets.length === 0) return `<p>3단계 작업을 먼저 완료해주세요.</p>`;

        const { activePath } = source.phases.phase5;
        const currentData = dataSets[activePath]?.data;
        if (!currentData) return `<p>데이터를 불러오는 중 오류가 발생했습니다. 3단계로 돌아가 다시 시도해주세요.</p>`;

        const config = source.phases.phase5.config[activePath] || {};
        const orderMode = config.orderMode || 'original';
        const previewData = DataTransformer._getPhase5OrderedData(currentData, config);
        const pathNav = dataSets.length > 1
            ? dataSets.map((set, index) => `<button data-path-index="${index}" class="path-nav-btn px-4 py-2 text-sm ${index === activePath ? 'active' : ''} ${source.phases.phase5.config[index]?.isComplete ? 'completed' : ''}">${set.name}</button>`).join('')
            : '';
        const mappingSummary = [
            ['일자', config.dateCol],
            ['거래종류', config.tradeTypeCol],
            ['거래금액', config.amountCol],
            ['잔액', config.balanceCol],
            ['적요', config.jukyoCol],
            ['수수료', config.feeCol],
            ['제세금', config.taxCol],
            ['기타비용1', config.extraCostCol1],
            ['기타비용2', config.extraCostCol2],
            ['기타비용3', config.extraCostCol3]
        ].map(([label, index]) => {
            const valueText = index !== undefined && previewData[0]
                ? `[${index + 1}열] ${previewData[0][index] ?? ''}`
                : '미선택';
            return `<div class="p-2 border rounded-md bg-slate-50"><label class="font-medium text-sm">${label}: </label><span class="font-bold text-indigo-600">${valueText}</span></div>`;
        }).join('');

        const tableHTML = this.generateTableHTML(previewData.slice(0, 10), { selectable: false });
        const normalizeTradeType = value => DataTransformer._normalizeTradeTypeValue
            ? DataTransformer._normalizeTradeTypeValue(value)
            : String(value ?? '').trim();
        const uniqueValues = config.tradeTypeCol !== undefined
            ? [...new Set(previewData.slice(1).map(row => normalizeTradeType(row[config.tradeTypeCol])).filter(Boolean))]
            : [];
        const deposits = [...new Set((config.depositTypes || []).map(normalizeTradeType).filter(Boolean))];
        const withdrawals = [...new Set((config.withdrawalTypes || []).map(normalizeTradeType).filter(Boolean))];
        const removals = [...new Set((config.valuesToRemove || []).map(normalizeTradeType).filter(Boolean))];
        const sourceItems = uniqueValues.filter(v => !deposits.includes(v) && !withdrawals.includes(v) && !removals.includes(v));
        const orderingUI = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div><label class="font-medium text-sm">기초가액: </label><input id="base-amount-input" type="number" value="${config.baseAmount || 0}" class="p-2 border rounded-md w-full"></div><div><label class="font-medium text-sm">행 정렬 기준: </label><select id="phase5-order-mode-select" class="p-2 border rounded-md w-full"><option value="original" ${orderMode === 'original' ? 'selected' : ''}>원본순</option><option value="reverse" ${orderMode === 'reverse' ? 'selected' : ''}>역순</option></select><p class="text-xs text-slate-500 mt-1">동일 거래일자만 있는 파일은 이 정렬 기준이 자동분류, 검증, 최종변환에 함께 반영됩니다.</p></div></div>`;
        const classificationUI = config.tradeTypeCol !== undefined
            ? `<div class="space-y-3"><div class="flex items-center space-x-4"><p class="text-slate-600 font-semibold">거래종류를 입금, 출금, 제거항목으로 분류해주세요.</p><button id="auto-classify-btn" class="px-3 py-1 bg-yellow-400 text-yellow-900 rounded-md hover:bg-yellow-500 text-sm font-bold">잔액 기준 자동 분류</button></div><p class="text-sm text-slate-500">자동 분류를 누르면 제거항목과 입출금이 함께 자동 배분됩니다.</p><div class="grid grid-cols-1 md:grid-cols-4 gap-4 mt-2"><div class="p-4 rounded-lg bg-slate-100 border"><h3 class="font-semibold mb-2">거래 종류</h3><div id="source-items" class="drop-zone p-2 rounded flex flex-wrap gap-2">${sourceItems.map(val => `<div class="draggable-item bg-white px-3 py-1 rounded shadow-sm border" draggable="true" data-value="${val}">${val}</div>`).join('')}</div></div><div class="p-4 rounded-lg bg-white border"><h3 class="font-semibold mb-2 text-blue-600">입금 항목</h3><div id="drop-zone-deposit" class="drop-zone p-2 rounded flex flex-wrap gap-2">${deposits.map(val => `<div class="draggable-item bg-blue-100 px-3 py-1 rounded shadow-sm border" draggable="true" data-value="${val}">${val}</div>`).join('')}</div></div><div class="p-4 rounded-lg bg-white border"><h3 class="font-semibold mb-2 text-red-600">출금 항목</h3><div id="drop-zone-withdrawal" class="drop-zone p-2 rounded flex flex-wrap gap-2">${withdrawals.map(val => `<div class="draggable-item bg-red-100 px-3 py-1 rounded shadow-sm border" draggable="true" data-value="${val}">${val}</div>`).join('')}</div></div><div class="p-4 rounded-lg bg-white border"><h3 class="font-semibold mb-2 text-amber-700">제거 항목</h3><div id="drop-zone-remove" class="drop-zone p-2 rounded flex flex-wrap gap-2">${removals.map(val => `<div class="draggable-item bg-amber-100 px-3 py-1 rounded shadow-sm border" draggable="true" data-value="${val}">${val}</div>`).join('')}</div></div></div></div>`
            : '';

        return `<div class="space-y-6"><header><h1 class="text-3xl font-bold text-slate-900">4단계: 입출금 및 제거 분류</h1></header><div class="flex border-b">${pathNav}</div><p class="text-slate-600 mt-2">3단계의 매핑을 바탕으로 최종 분류만 진행합니다.</p><div class="overflow-x-auto border rounded-lg bg-white shadow-sm my-4">${tableHTML}</div><div class="grid grid-cols-2 md:grid-cols-4 gap-2">${mappingSummary}</div>${orderingUI}<div class="mt-4 space-y-4">${classificationUI}</div><div class="flex items-center space-x-3 mt-4"><button id="process-phase5-btn" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">분류 완료 & 최종 변환</button><button id="reset-phase5-btn" class="px-4 py-2 bg-slate-500 text-white rounded-md hover:bg-slate-600">분류 초기화</button></div></div>`;
    };

    UIRenderer.renderDownloadSection = function() {
        const { sources } = AppState.getState();
        const completedSources = sources.filter(s => s.status === 'completed');

        if (completedSources.length > 0) this.downloadSectionEl.classList.remove('hidden');
        else this.downloadSectionEl.classList.add('hidden');

        const phase3Btn = document.getElementById('download-phase3-btn');
        const phase4Btn = document.getElementById('download-phase4-btn');
        const phase5Btn = document.getElementById('download-phase5-btn');

        if (phase3Btn) {
            phase3Btn.disabled = completedSources.length === 0;
            phase3Btn.textContent = '\uC801\uC694\uC0DD\uC131\uACB0\uACFC';
        }
        if (phase4Btn) {
            phase4Btn.disabled = completedSources.length === 0;
            phase4Btn.style.display = '';
            phase4Btn.textContent = '\uC81C\uAC70\uD56D\uBAA9';
        }
        if (phase5Btn) {
            phase5Btn.disabled = completedSources.length === 0;
            phase5Btn.textContent = '\uCD5C\uC885 \uBCC0\uD658 \uACB0\uACFC';
        }
    };

    AppController.handleDownload = function(phase) {
        const { sources } = AppState.getState();
        const completedSources = sources.filter(s => s.status === 'completed');
        const sheets = [];
        let filename = '\uACB0\uACFC.xlsx';

        completedSources.forEach(source => {
            if (phase === 'phase3' && source.phases.phase3.output) {
                source.phases.phase3.output.forEach(dataSet => {
                    sheets.push({ name: `${source.name.substring(0, 15)}_${dataSet.name}`, data: dataSet.data });
                });
                filename = '\uC801\uC694\uC0DD\uC131\uACB0\uACFC.xlsx';
            } else if (phase === 'phase4' && source.phases.phase4.removed) {
                source.phases.phase4.removed.forEach(dataSet => {
                    if (dataSet.data.length > 1) {
                        sheets.push({ name: `${source.name.substring(0, 15)}_${dataSet.name}`, data: dataSet.data });
                    }
                });
                filename = '\uC81C\uAC70\uD56D\uBAA9.xlsx';
            } else if (phase === 'phase5' && source.phases.phase5.output) {
                source.phases.phase5.output.forEach(dataSet => {
                    sheets.push({ name: `${source.name.substring(0, 15)}_${dataSet.name}`, data: dataSet.data });
                });
                filename = '\uCD5C\uC885\uBCC0\uD658\uACB0\uACFC.xlsx';
            }
        });

        if (sheets.length > 0) {
            DataTransformer.generateMultiSheetDownloadLink(sheets, filename);
        } else {
            UIRenderer.showModal(
                '\uC54C\uB9BC',
                '\uC120\uD0DD\uD55C \uACB0\uACFC\uB97C \uB2E4\uC6B4\uB85C\uB4DC\uD560 \uC218 \uC5C6\uC2B5\uB2C8\uB2E4.',
                [{ text: '\uD655\uC778', className: 'bg-indigo-600 text-white', onClick: () => UIRenderer.hideModal() }]
            );
        }
    };

    AppController.processPhase5 = function(ignoreWarning = false) {
        const source = AppState.getActiveSource();
        const { activePath } = source.phases.phase5;
        const rawDataSet = source.phases.phase4.output[activePath];
        const currentConfig = source.phases.phase5.config[activePath];

        if (!currentConfig) {
            return UIRenderer.showModal(
                '\uC54C\uB9BC',
                '\uD604\uC7AC \uD30C\uC77C\uC758 \uBD84\uB958 \uC124\uC815\uC744 \uBA3C\uC800 \uC644\uB8CC\uD574\uC8FC\uC138\uC694.',
                [{ text: '\uD655\uC778', className: 'bg-indigo-600 text-white', onClick: () => UIRenderer.hideModal() }]
            );
        }

        const validation = DataTransformer.validatePhase5Config(currentConfig);
        const splitCurrent = DataTransformer.transformPhase4(rawDataSet.data, currentConfig);
        const dataSet = { ...rawDataSet, data: splitCurrent.kept };

        if (!validation.isValid) {
            return UIRenderer.showModal(
                '\uC54C\uB9BC',
                validation.message,
                [{ text: '\uD655\uC778', className: 'bg-indigo-600 text-white', onClick: () => UIRenderer.hideModal() }]
            );
        }

        if (!ignoreWarning) {
            const verification = DataTransformer.verifyPhase5(dataSet.data, currentConfig);
            if (!verification.isCorrect) {
                const adjustmentInfo = DataTransformer.getPhase5BalanceAdjustmentInfo(dataSet.data, currentConfig);
                const modalButtons = [
                    { text: '\uC608 (\uD604 \uB2E8\uACC4\uC5D0\uC11C \uC870\uC815)', className: 'bg-red-600 hover:bg-red-700 text-white', onClick: () => AppController.handleBalanceMismatchRestart() }
                ];

                if (adjustmentInfo) {
                    modalButtons.push({
                        text: '\uCC98\uC74C \uAC70\uB798\uC77C \uC804\uC77C \uBCF4\uC815 \uD6C4 \uBCC0\uD658',
                        className: 'bg-amber-500 hover:bg-amber-600 text-white',
                        onClick: () => {
                            UIRenderer.hideModal();
                            AppController._updateActiveSource(s => {
                                const phase5Config = s.phases.phase5.config[s.phases.phase5.activePath] || {};
                                s.phases.phase5.config[s.phases.phase5.activePath] = {
                                    ...phase5Config,
                                    balanceAdjustmentMode: 'previous_day'
                                };
                                return s;
                            });
                            AppController.processPhase5(true);
                        }
                    });

                    if ((adjustmentInfo.dailyMismatchCount || 0) > 0) {
                        modalButtons.push({
                            text: '\uCC28\uC774 \uBC1C\uC0DD\uC77C \uB9D0\uD589 \uBCF4\uC815 \uD6C4 \uBCC0\uD658',
                            className: 'bg-emerald-600 hover:bg-emerald-700 text-white',
                            onClick: () => {
                                UIRenderer.hideModal();
                                AppController._updateActiveSource(s => {
                                    const phase5Config = s.phases.phase5.config[s.phases.phase5.activePath] || {};
                                    s.phases.phase5.config[s.phases.phase5.activePath] = {
                                        ...phase5Config,
                                        balanceAdjustmentMode: 'mismatch_dates'
                                    };
                                    return s;
                                });
                                AppController.processPhase5(true);
                            }
                        });
                    }
                }

                modalButtons.push({
                    text: '\uC544\uB2C8\uC624 (\uBB34\uC2DC\uD558\uACE0 \uBCC0\uD658)',
                    className: 'bg-slate-200 hover:bg-slate-300 text-slate-800',
                    onClick: () => { UIRenderer.hideModal(); AppController.processPhase5(true); }
                });

                let adjustmentText = adjustmentInfo
                    ? `<br><span class='text-amber-700 font-semibold'>차액 ${Math.round(adjustmentInfo.diff).toLocaleString()}원을 ${adjustmentInfo.adjustmentDate || '첫 거래일 전일'} 기준 잔액보정 행으로 추가하는 옵션을 사용할 수 있습니다.</span>`
                    : '';
                if (adjustmentInfo) {
                    adjustmentText = `<br><span class='text-amber-700 font-semibold'>\uCD5C\uC885 \uCC28\uC774 ${Math.round(adjustmentInfo.diff || 0).toLocaleString()}\uC6D0, \uCCB4\uD06C\uD3EC\uC778\uD2B8 \uBD88\uC77C\uCE58 ${adjustmentInfo.mismatchCount || 0}\uAC74, \uC77C\uC790 \uB9D0\uD589 \uBD88\uC77C\uCE58 ${adjustmentInfo.dailyMismatchCount || 0}\uAC74\uC785\uB2C8\uB2E4. \uD544\uC694\uD558\uBA74 ${adjustmentInfo.previousDayAdjustmentDate || '\uCCAB \uAC70\uB798\uC77C \uC804\uC77C'} \uAE30\uC900 \uBCF4\uC815\uACFC \uCC28\uC774 \uBC1C\uC0DD\uC77C \uB9D0\uD589 \uAE30\uC900 \uBCF4\uC815 \uC911 \uD558\uB098\uB97C \uC120\uD0DD\uD560 \uC218 \uC788\uC2B5\uB2C8\uB2E4.</span>`;
                }
                return UIRenderer.showModal(
                    '\uC794\uC561 \uD750\uB984 \uBD88\uC77C\uCE58',
                    `\uACC4\uC0B0\uB41C \uCD5C\uC885 \uC794\uC561(<b class='text-blue-600'>${(verification.calculated || 0).toLocaleString()}</b>)\uACFC \uC6D0\uBCF8 \uCD5C\uC885 \uC794\uC561(<b class='text-red-600'>${(verification.original || 0).toLocaleString()}</b>)\uC774 \uC77C\uCE58\uD558\uC9C0 \uC54A\uC2B5\uB2C8\uB2E4.<br>\uC6D0\uBCF8 \uC794\uC561 \uCCB4\uD06C\uD3EC\uC778\uD2B8 ${verification.checkpointCount || 0}\uAC74 \uC911 ${verification.mismatchCount || 0}\uAC74\uC774 \uC5B4\uAE0B\uB098 \uC788\uC2B5\uB2C8\uB2E4.<br>\uD604 \uB2E8\uACC4\uC5D0\uC11C \uC81C\uAC70 \uD56D\uBAA9\uACFC \uC785\uCD9C\uAE08 \uBD84\uB958\uB97C \uB2E4\uC2DC \uD655\uC778\uD558\uACA0\uC2B5\uB2C8\uAE4C?${adjustmentText}`,
                    modalButtons,
                    { allowHtml: true }
                );
            }
        }

        AppController._updateActiveSource(s => {
            const config = s.phases.phase5.config[s.phases.phase5.activePath];
            config.isComplete = true;
            config.status = ignoreWarning ? 'WARNING' : 'VALIDATED';

            const dataSets = s.phases.phase4.output;
            const allPathsCompleted = dataSets.every((_, index) => s.phases.phase5.config[index]?.isComplete);

            if (allPathsCompleted) {
                const splitResults = dataSets.map((ds, index) => {
                    const phase5Config = s.phases.phase5.config[index];
                    const split = DataTransformer.transformPhase4(ds.data, phase5Config);
                    return { ds, split, phase5Config };
                });

                s.phases.phase4.removed = splitResults.map(({ ds, split }) => ({
                    ...ds,
                    data: split.removed
                }));

                s.phases.phase5.output = splitResults.map(({ ds, split, phase5Config }) => ({
                    ...ds,
                    data: DataTransformer.transformPhase5(split.kept, phase5Config)
                }));

                s.phases.phase5.isComplete = true;
                s.currentPhase = 'download';
            } else {
                const nextIndex = dataSets.findIndex((_, index) => !s.phases.phase5.config[index]?.isComplete);
                if (nextIndex >= 0) s.phases.phase5.activePath = nextIndex;
            }

            return s;
        });
    };

    document.addEventListener('DOMContentLoaded', () => {
        AppState.init();
        UIRenderer.init();
        UIRenderer.render();
    });
    </script>
</body>
</html>
