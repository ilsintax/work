<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>지능형 금융 데이터변환기(정밀 업데이트 진행중)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .preview-table { border-collapse: collapse; width: 100%; font-size: .8rem; }
        .preview-table th, .preview-table td {
            border: 1px solid #e2e8f0; padding: .375rem .5rem; text-align: left;
            white-space: nowrap; min-width: 20px;
        }
        .preview-table th { background-color: #f8fafc; font-weight: 600; }
        .selectable:hover { background-color: #f0f9ff; cursor: pointer; }
        .highlighted { background-color: #bae6fd !important; }
        .highlight-p3-dateCol { background-color: #fbcfe8 !important; }
        .highlight-p3-tradeTypeCol { background-color: #a7f3d0 !important; }
        .highlight-p3-amountCol { background-color: #fed7aa !important; }
        .highlight-p3-balanceCol { background-color: #bfdbfe !important; }
        .highlight-p3-feeCol { background-color: #fecaca !important; }
        .highlight-p3-taxCol { background-color: #fef08a !important; }
        .highlight-p3-extraCostCol1 { background-color: #ddd6fe !important; }
        .highlight-p3-extraCostCol2 { background-color: #c7d2fe !important; }
        .highlight-p3-extraCostCol3 { background-color: #e9d5ff !important; }
        .highlight-p3-stockNameCol { background-color: #fde68a !important; }
        .highlight-p3-stockQtyCol { background-color: #fecaca !important; }
        .highlight-p3-unitPriceCol { background-color: #d8b4fe !important; }
        .highlight-p3-stockBalanceCol { background-color: #bfdbfe !important; }
        .highlight-p3-additionalCol1, .highlight-p3-additionalCol2 { background-color: #d1d5db !important; }
        
        .drop-zone { min-height: 80px; border: 2px dashed #cbd5e1; background-color: #f8fafc; transition: all 0.2s; }
        .drop-zone.drag-over { background-color: #e0f2fe; border-color: #3b82f6; }
        .draggable-item { cursor: grab; }
        .draggable-item:active { cursor: grabbing; }
        .sidebar-btn { transition: all 0.2s; }
        .sidebar-btn.active { background-color: #eef2ff; color: #4338ca; font-weight: 600; border-right: 3px solid #4f46e5;}
        .sidebar-btn.completed::after { content: '✔'; margin-left: auto; color: #16a34a; font-weight: bold; }
        .sidebar-btn:disabled { color: #9ca3af; cursor: not-allowed; background-color: #f9fafb; }
        .path-nav-btn { transition: all 0.2s; border-bottom: 2px solid transparent; }
        .path-nav-btn.active { color: #4f46e5; border-bottom-color: #4f46e5; font-weight: 600; }
        .path-nav-btn.completed { color: #16a34a; }
        .selection-box { cursor: pointer; transition: all 0.2s; }
        .selection-box.selecting { border-color: #4f46e5; box-shadow: 0 0 0 2px #c7d2fe; }
        .modal { transition: opacity 0.25s ease; }
        .task-item { transition: all 0.2s; }
        .task-item.active { background-color: #eef2ff; border-left-color: #4f46e5; }
        #paste-area:empty::before {
            content: attr(placeholder);
            color: #64748b; /* text-slate-500 */
            cursor: text;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg-base: #f4f7fb;
            --bg-accent: rgba(13, 148, 136, 0.18);
            --bg-accent-strong: rgba(59, 130, 246, 0.16);
            --surface: rgba(255, 255, 255, 0.86);
            --surface-border: rgba(148, 163, 184, 0.2);
            --surface-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
            --text-strong: #0f172a;
            --text-muted: #475569;
            --brand: #1d4ed8;
        }
        body {
            font-family: 'IBM Plex Sans KR', sans-serif;
            background:
                radial-gradient(circle at top left, var(--bg-accent), transparent 32%),
                radial-gradient(circle at top right, var(--bg-accent-strong), transparent 28%),
                linear-gradient(180deg, #f8fbff 0%, var(--bg-base) 45%, #eef3f9 100%);
            color: var(--text-strong);
            position: relative;
        }
        body::before,
        body::after {
            content: '';
            position: fixed;
            width: 22rem;
            height: 22rem;
            border-radius: 9999px;
            filter: blur(70px);
            opacity: 0.45;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            top: -5rem;
            left: -6rem;
            background: rgba(45, 212, 191, 0.22);
        }
        body::after {
            right: -5rem;
            bottom: 6rem;
            background: rgba(96, 165, 250, 0.22);
        }
        h1, h2, h3 { letter-spacing: -0.03em; }
        .app-shell { position: relative; z-index: 1; }
        .hero-panel {
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.16);
            border-radius: 28px;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.94), rgba(248, 250, 252, 0.84)),
                rgba(255, 255, 255, 0.78);
            box-shadow: var(--surface-shadow);
            padding: 2rem;
            text-align: center;
        }
        .hero-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(120deg, rgba(29, 78, 216, 0.08), transparent 45%),
                linear-gradient(300deg, rgba(13, 148, 136, 0.08), transparent 40%);
            pointer-events: none;
        }
        .hero-panel > * { position: relative; z-index: 1; }
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.45rem 0.9rem;
            border-radius: 9999px;
            background: rgba(15, 23, 42, 0.04);
            border: 1px solid rgba(148, 163, 184, 0.18);
            color: #0f172a;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }
        .hero-badge::before {
            content: '';
            width: 0.55rem;
            height: 0.55rem;
            border-radius: 9999px;
            background: linear-gradient(135deg, #0f766e, #2563eb);
            box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.08);
        }
        .hero-title { font-family: 'Space Grotesk', 'IBM Plex Sans KR', sans-serif; }
        .hero-copy {
            max-width: 48rem;
            margin: 1rem auto 0;
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.75;
        }
        .surface-card {
            border: 1px solid var(--surface-border);
            background: var(--surface);
            backdrop-filter: blur(14px);
            border-radius: 24px;
            box-shadow: var(--surface-shadow);
        }
        .section-heading {
            border-bottom: 1px solid rgba(148, 163, 184, 0.18);
            padding-bottom: 1rem;
            margin-bottom: 1.25rem;
        }
        .section-kicker {
            display: inline-block;
            margin-bottom: 0.55rem;
            color: var(--brand);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .preview-table th {
            background: linear-gradient(180deg, #f8fbff 0%, #eef4fb 100%);
            color: #334155;
        }
        .preview-table th,
        .preview-table td {
            border-color: #dbe4f0;
            padding: .45rem .6rem;
        }
        .preview-table tr:nth-child(even) td { background-color: rgba(248, 250, 252, 0.55); }
        .selectable:hover { background-color: #e0f2fe; }
        .highlighted { background-color: #bfdbfe !important; }
        .drop-zone {
            background: linear-gradient(180deg, rgba(248, 250, 252, 0.92), rgba(241, 245, 249, 0.76));
            border-radius: 18px;
        }
        .drop-zone.drag-over {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
        }
        .draggable-item {
            border-radius: 9999px;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }
        .draggable-item:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
        }
        .sidebar-shell {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(248, 250, 252, 0.9));
        }
        .workspace-main {
            background: linear-gradient(180deg, rgba(248, 250, 252, 0.82), rgba(241, 245, 249, 0.95));
        }
        .sidebar-btn {
            border: 1px solid transparent;
            border-radius: 14px;
        }
        .sidebar-btn.active {
            background: linear-gradient(135deg, rgba(219, 234, 254, 0.92), rgba(224, 231, 255, 0.92));
            color: #1d4ed8;
            font-weight: 700;
            border-color: rgba(96, 165, 250, 0.35);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }
        .sidebar-btn.completed::after { content: 'OK'; }
        .sidebar-btn:disabled { background-color: rgba(248, 250, 252, 0.85); }
        .path-nav-btn {
            color: #64748b;
        }
        .path-nav-btn.active {
            color: #1d4ed8;
            border-bottom-color: #1d4ed8;
            font-weight: 700;
        }
        .selection-box {
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.78);
        }
        .selection-box.mapping-ok {
            border-color: rgba(22, 163, 74, 0.38);
            background: rgba(220, 252, 231, 0.78);
        }
        .selection-box.mapping-missing {
            border-color: rgba(236, 72, 153, 0.35);
            background: rgba(252, 231, 243, 0.78);
        }
        .selection-box.selecting {
            border-color: #2563eb;
            background: rgba(219, 234, 254, 0.52);
            box-shadow: 0 0 0 3px rgba(147, 197, 253, 0.32);
        }
        .broker-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.45rem 0.85rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 700;
        }
        .broker-chip.detected {
            background: rgba(220, 252, 231, 0.9);
            color: #166534;
        }
        .broker-chip.unknown {
            background: rgba(252, 231, 243, 0.9);
            color: #9d174d;
        }
        .modal-panel {
            border: 1px solid rgba(148, 163, 184, 0.16);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.16);
        }
        .task-item.active {
            background: linear-gradient(135deg, rgba(219, 234, 254, 0.9), rgba(224, 231, 255, 0.9));
            border-left-color: #2563eb;
        }
        .upload-actions label,
        button {
            transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
        }
        .upload-actions label:hover,
        button:hover {
            transform: translateY(-1px);
        }
        .upload-actions label {
            border-radius: 14px;
            border-color: rgba(148, 163, 184, 0.32) !important;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
        }
        #source-list-container {
            background: linear-gradient(180deg, rgba(248, 250, 252, 0.92), rgba(241, 245, 249, 0.82));
            border-color: rgba(148, 163, 184, 0.22);
            border-radius: 20px;
        }
        #paste-area {
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.72);
        }
        #wizard-container #app {
            border-radius: 22px;
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.12);
            background: rgba(255, 255, 255, 0.75);
        }
        @media (max-width: 1279px) {
            #wizard-container #app {
                display: flex;
                flex-direction: column;
            }
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 antialiased">

    <div class="app-shell max-w-7xl mx-auto px-4 py-6 md:px-8 md:py-10 space-y-8">
        <header class="hero-panel">
            <div class="hero-badge">Stock Balance Workspace</div>
            <h1 class="text-4xl font-bold text-slate-900">지능형 금융 데이터변환기(정밀 업데이트 진행중)</h1>
            <p class="text-slate-600 mt-2">여러 개의 엑셀 파일/시트를 하나의 워크플로우에서 처리하세요.</p>
        </header>

        <!-- 1. 데이터 소스 추가 -->
        <div class="surface-card p-6 md:p-7">
            <h2 class="text-xl font-bold border-b pb-3 mb-4">1. 변환할 데이터 추가</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <div class="upload-actions space-y-3">
                        <label for="single-file-upload" class="w-full text-center block px-4 py-2 bg-white border border-slate-300 text-slate-700 rounded-md hover:bg-slate-50 cursor-pointer">단일파일선택(여러 시트 포함 가능)</label>
                        <input id="single-file-upload" type="file" class="hidden" accept=".xlsx, .xls">
                        <label for="multi-file-upload" class="w-full text-center block px-4 py-2 bg-white border border-slate-300 text-slate-700 rounded-md hover:bg-slate-50 cursor-pointer">여러 파일 한번에 선택</label>
                        <input id="multi-file-upload" type="file" class="hidden" accept=".xlsx, .xls" multiple>
                        <div id="paste-area" class="p-4 min-h-[80px] border-2 border-dashed rounded-lg flex items-center justify-center text-slate-500 hover:border-indigo-400" contenteditable="true" placeholder="엑셀 데이터 복사 후 여기에 붙여넣기 (Ctrl+V)"></div>
                    </div>
                </div>
                <div id="source-list-container" class="bg-slate-50 p-4 rounded-md border max-h-60 overflow-y-auto">
                    <h3 class="font-semibold text-lg mb-2 text-slate-700">작업 목록</h3>
                    <ul id="source-list" class="space-y-2">
                        <p class="text-slate-500 text-center py-4">파일을 추가하거나 데이터를 붙여넣으세요.</p>
                    </ul>
                </div>
            </div>
        </div>

        <!-- 2. 변환 작업 -->
        <div id="wizard-container" class="surface-card p-6 md:p-7 hidden">
             <h2 class="text-xl font-bold border-b pb-3 mb-4 flex items-center gap-2">
                <span>2. 변환 작업:</span>
                <input type="text" id="active-task-name-input" class="text-indigo-600 font-bold p-1 border-b-2 border-transparent focus:border-indigo-500 outline-none bg-transparent flex-1 min-w-0">
            </h2>
            <div id="app" class="flex h-full min-h-[500px] xl:flex-row">
                <aside id="sidebar" class="sidebar-shell xl:w-64 w-full border-b xl:border-b-0 xl:border-r border-slate-200 flex flex-col flex-shrink-0 p-4 space-y-2">
                    <!-- JS 렌더링 영역 -->
                </aside>
                <main class="workspace-main flex-1 p-4 md:p-8 overflow-y-auto xl:rounded-r-[22px]">
                    <div id="main-content" class="max-w-6xl mx-auto">
                        <!-- JS 렌더링 영역 -->
                    </div>
                </main>
            </div>
        </div>
        
        <!-- 3. 결과 다운로드 -->
        <div id="download-section" class="surface-card p-6 md:p-7 hidden">
            <h2 class="text-xl font-bold border-b pb-3 mb-4">3. 결과 다운로드</h2>
            <p class="text-slate-600 mb-4">작업이 완료된 데이터들을 단계별로 다운로드할 수 있습니다. 각 작업은 별도의 시트로 저장됩니다.</p>
            <div class="flex flex-wrap gap-4">
                <button id="download-phase3-btn" class="px-5 py-2.5 bg-sky-500 text-white rounded-md hover:bg-sky-600 disabled:bg-sky-300">3단계: 적요 생성 결과</button>
                <button id="download-phase4-btn" class="px-5 py-2.5 bg-rose-500 text-white rounded-md hover:bg-rose-600 disabled:bg-rose-300">4단계: 제거된 항목</button>
                <button id="download-phase5-btn" class="px-5 py-2.5 bg-emerald-600 text-white rounded-md hover:bg-emerald-700 disabled:bg-emerald-300">5단계: 최종 변환 결과</button>
            </div>
        </div>
    </div>


    <!-- 모달 -->
    <div id="modal" class="modal fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="modal-panel rounded-[24px] p-6 w-full max-w-md">
            <h2 id="modal-title" class="text-xl font-bold mb-4 text-slate-800"></h2>
            <p id="modal-message" class="text-slate-600 mb-6"></p>
            <div id="modal-buttons" class="flex justify-end space-x-3">
                <!-- 버튼 동적 생성 -->
            </div>
        </div>
    </div>

    <script>
    /******************************************************************************
     * 지능형 금융 데이터변환기(정밀 업데이트 진행중)
     ******************************************************************************/
    
    // --- 1. 상태 관리 (State Management) ---
    const AppState = {
        _state: {},
        _listeners: [],
        init() {
            this._state = {
                sources: [], // { id, name, rawData, status ('pending', 'active', 'completed'), currentPhase, phases: {...} }
                activeSourceId: null,
            };
        },
        getState() { return this._state; },
        setState(updater) {
            const oldState = JSON.parse(JSON.stringify(this._state));
            this._state = typeof updater === 'function' ? updater(oldState) : { ...oldState, ...updater };
            console.log("State Updated:", this._state);
            this.notify();
        },
        subscribe(listener) { this._listeners.push(listener); },
        notify() { this._listeners.forEach(listener => listener()); },
        getActiveSource() {
            if (!this._state.activeSourceId) return null;
            return this._state.sources.find(s => s.id === this._state.activeSourceId);
        }
    };

    // --- 2. UI 렌더링 (UI Rendering) ---
    const UIRenderer = {
        init() {
            // Cache DOM elements
            this.sourceListEl = document.getElementById('source-list');
            this.wizardContainerEl = document.getElementById('wizard-container');
            this.activeTaskNameInputEl = document.getElementById('active-task-name-input');
            this.sidebarEl = document.getElementById('sidebar');
            this.mainContentEl = document.getElementById('main-content');
            this.downloadSectionEl = document.getElementById('download-section');
            this.modalEl = document.getElementById('modal');
            this.modalTitleEl = document.getElementById('modal-title');
            this.modalMessageEl = document.getElementById('modal-message');
            this.modalButtonsEl = document.getElementById('modal-buttons');
            AppState.subscribe(() => this.render());

            // Attach listeners for static elements ONCE to prevent duplication
            document.getElementById('single-file-upload').addEventListener('change', AppController.handleFileUpload);
            document.getElementById('multi-file-upload').addEventListener('change', AppController.handleFileUpload);
            document.getElementById('paste-area').addEventListener('paste', AppController.handlePaste);
            document.getElementById('download-phase3-btn').addEventListener('click', () => AppController.handleDownload('phase3'));
            document.getElementById('download-phase4-btn').addEventListener('click', () => AppController.handleDownload('phase4'));
            document.getElementById('download-phase5-btn').addEventListener('click', () => AppController.handleDownload('phase5'));
        },
        escapeHTML(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        },
        render() {
            this.renderSourceList();
            this.renderWizard();
            this.renderDownloadSection();
            this.attachTopLevelEventListeners();
        },
        renderSourceList() {
            const { sources } = AppState.getState();
            if (sources.length === 0) {
                this.sourceListEl.innerHTML = `<p class="text-slate-500 text-center py-4">파일을 추가하거나 데이터를 붙여넣으세요.</p>`;
                return;
            }
            this.sourceListEl.innerHTML = sources.map(source => {
                let statusBadge = '';
                if (source.status === 'completed') {
                    statusBadge = `<span class="text-xs font-bold text-green-600">✔ 완료</span>`;
                } else if (AppState.getState().activeSourceId === source.id) {
                    statusBadge = `<span class="text-xs font-bold text-indigo-600">작업중...</span>`;
                }
                return `
                    <li data-source-id="${source.id}" class="task-item flex items-center justify-between p-2 rounded-md border-l-4 ${AppState.getState().activeSourceId === source.id ? 'active' : 'border-transparent'} hover:bg-slate-100 cursor-pointer">
                        <div class="flex-1 min-w-0">
                             <p class="truncate text-sm font-medium text-slate-800">${this.escapeHTML(source.name)}</p>
                             ${statusBadge}
                        </div>
                        <button data-delete-id="${source.id}" class="delete-source-btn ml-2 text-slate-400 hover:text-red-600 text-lg">&times;</button>
                    </li>
                `;
            }).join('');
        },
        renderWizard() {
            const activeSource = AppState.getActiveSource();
            if (!activeSource) {
                this.wizardContainerEl.classList.add('hidden');
                return;
            }
            this.wizardContainerEl.classList.remove('hidden');
            this.activeTaskNameInputEl.value = activeSource.name;
            
            this.sidebarEl.innerHTML = this.renderSidebar(activeSource);
            this.mainContentEl.innerHTML = this.renderPhaseView(activeSource);
            this.attachWizardEventListeners();
        },
        renderDownloadSection() {
            const { sources } = AppState.getState();
            const completedSources = sources.filter(s => s.status === 'completed');

            if (completedSources.length > 0) {
                this.downloadSectionEl.classList.remove('hidden');
            } else {
                this.downloadSectionEl.classList.add('hidden');
            }

            document.getElementById('download-phase3-btn').disabled = completedSources.length === 0;
            document.getElementById('download-phase4-btn').disabled = completedSources.length === 0;
            document.getElementById('download-phase5-btn').disabled = completedSources.length === 0;
        },
        renderSidebar(source) {
            const phases = [
                { id: 'phase1', name: '1. 행 병합' }, { id: 'phase2', name: '2. 통화별 분리' },

            return `<div class="space-y-6"><header><h1 class="text-3xl font-bold text-slate-900">5단계: 매핑 검증 및 최종 변환</h1></header><div class="flex border-b">${pathNav}</div><p class="text-slate-600 mt-2">3단계와 4단계에서 고른 값은 자동으로 채워집니다. 먼저 최종 매핑을 확인한 뒤, 제거 후보를 재검토하고 입출금 분류를 마무리해주세요.</p><div class="overflow-x-auto border rounded-lg bg-white shadow-sm my-4">${tableHTML}</div><div class="grid grid-cols-2 md:grid-cols-4 gap-2">${selectionUI}</div><div><label class="font-medium text-sm">기초가액: </label><input id="base-amount-input" type="number" value="${config.baseAmount || 0}" class="p-2 border rounded-md"></div><div class="mt-4 space-y-4">${removalUI}${dragDropUI}</div><div class="flex items-center space-x-3 mt-4"><button id="process-phase5-btn" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">현재 통화 최종 변환 & 다음으로</button><button id="reset-phase5-btn" class="px-4 py-2 bg-slate-500 text-white rounded-md hover:bg-slate-600">선택 초기화</button></div></div>`;
        },
        renderDownloadView() {
             return `<div class="text-center py-10"><h1 class="text-4xl font-bold text-green-600">🎉 이 작업 변환 완료!</h1><p class="text-slate-600 mt-4">모든 단계가 완료되었습니다. 사이드바의 '현재 작업 완료' 버튼을 눌러 목록으로 돌아가거나, 다른 단계를 클릭하여 수정할 수 있습니다.</p></div>`;
        },
        generateTableHTML(data, options = {}) {
            let html = '<table class="preview-table">';
            data.forEach((row, rowIndex) => {
                const rowClass = options.selectable === 'row' ? `selectable ${options.selectedRows?.includes(rowIndex) ? 'highlighted' : ''}` : '';
                html += `<tr data-row-index="${rowIndex}" class="${rowClass}">`;
                (row || []).forEach((cell, colIndex) => {
                    let colClass = options.selectable === 'col' ? 'selectable' : '';
                    if (options.selectedCols?.includes(colIndex)) colClass += ' highlighted';
                    if (options.highlightMapping) {
                        for (const [className, col] of Object.entries(options.highlightMapping)) {
                            if (col === colIndex) colClass += ` ${className}`;
                        }
                    }
                    html += `<td data-col-index="${colIndex}" class="${colClass}">${this.escapeHTML(cell ?? '')}</td>`;
                });
                html += '</tr>';
            });
            html += '</table>';
            return html;
        },
        getPrevPhase(phaseId) {
            const order = ['upload', 'phase1', 'phase2', 'phase3', 'phase4', 'phase5', 'download'];
            const index = order.indexOf(phaseId);
            return index > 0 ? order[index - 1] : 'upload';
        },
        showModal(title, message, buttons, options = {}) {
            this.modalTitleEl.textContent = title;
            if (options.allowHtml) {
                this.modalMessageEl.innerHTML = message;
            } else {
                this.modalMessageEl.textContent = String(message ?? '');
            }
            this.modalButtonsEl.innerHTML = '';
            buttons.forEach(btnInfo => {
                const button = document.createElement('button');
                button.textContent = btnInfo.text;
                button.className = `px-4 py-2 rounded-md font-semibold ${btnInfo.className}`;
                button.onclick = btnInfo.onClick;
                this.modalButtonsEl.appendChild(button);
            });
            this.modalEl.classList.remove('hidden');
        },
        hideModal() {
            this.modalEl.classList.add('hidden');
        },
        attachTopLevelEventListeners() {
            // Listeners for DYNAMICALLY created elements that need to be re-attached after every render
            this.sourceListEl.querySelectorAll('.task-item').forEach(item => {
                 item.onclick = (e) => {
                    if (!e.target.classList.contains('delete-source-btn')) {
                        AppController.setActiveSource(e.currentTarget.dataset.sourceId);
                    }
                };
            });

             this.sourceListEl.querySelectorAll('.delete-source-btn').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    AppController.deleteSource(e.currentTarget.dataset.deleteId);
                };
            });
        },
        attachWizardEventListeners() {
            const activeSource = AppState.getActiveSource();
            if (!activeSource) return;

            const activeTaskNameInput = document.getElementById('active-task-name-input');
            if (activeTaskNameInput) {
                activeTaskNameInput.onchange = (e) => AppController.updateActiveSourceName(e.target.value);
            }

            document.querySelectorAll('.sidebar-btn').forEach(btn => btn.onclick = (e) => AppController.navigate(e.currentTarget.dataset.phase));
            
            const resetBtn = document.getElementById('reset-btn');
            if(resetBtn) {
                resetBtn.onclick = () => {
                    this.showModal(
                        '작업 초기화', '정말로 현재 작업의 모든 진행 상황을 초기화하시겠습니까?',
                        [
                            { text: '아니오', className: 'bg-slate-200 hover:bg-slate-300 text-slate-800', onClick: () => this.hideModal() },
                            { text: '예 (초기화)', className: 'bg-red-600 hover:bg-red-700 text-white', onClick: () => { AppController.resetActiveSource(); this.hideModal(); } }
                        ]
                    );
                };
            }

            const completeTaskBtn = document.getElementById('complete-task-btn');
            if (completeTaskBtn) completeTaskBtn.onclick = AppController.completeActiveTask;

            switch(activeSource.currentPhase) {
                case 'phase1':
                    document.querySelectorAll('#main-content .selectable').forEach(row => row.onclick = e => AppController.handlePhase1RowSelect(parseInt(e.currentTarget.dataset.rowIndex, 10)));
                    document.getElementById('process-phase1-btn').onclick = AppController.processPhase1;
                    document.getElementById('reset-phase1-btn').onclick = AppController.resetPhase1;
                    break;
                case 'phase2':
                    document.querySelectorAll('#main-content .selectable').forEach(col => col.onclick = e => AppController.handlePhase2ColSelect(parseInt(e.currentTarget.dataset.colIndex, 10)));
                    if (document.getElementById('add-group-btn')) document.getElementById('add-group-btn').onclick = AppController.handlePhase2AddGroup;
                    document.querySelectorAll('.group-name-input').forEach(input => input.onchange = e => AppController.handlePhase2GroupNameChange(parseInt(e.currentTarget.dataset.groupIndex, 10), e.currentTarget.value));
                    document.querySelectorAll('.group-market-type-select').forEach(select => select.onchange = e => AppController.handlePhase2GroupTypeChange(parseInt(e.currentTarget.dataset.groupIndex, 10), e.currentTarget.value));
                    document.getElementById('process-phase2-btn').onclick = AppController.processPhase2;
                    this.attachDragAndDropListeners('phase2');
                    break;
                case 'phase3':
                    document.querySelectorAll('#main-content .selection-box').forEach(box => box.onclick = e => AppController.handlePhase3KeySelect(e.currentTarget.dataset.key));
                    document.querySelectorAll('#main-content .selectable').forEach(col => col.onclick = e => AppController.handlePhase3ColSelect(parseInt(e.currentTarget.dataset.colIndex, 10)));
                    document.querySelectorAll('.path-nav-btn').forEach(btn => btn.onclick = e => AppController.handlePhase3PathChange(parseInt(e.currentTarget.dataset.pathIndex, 10)));
                    document.getElementById('process-phase3-btn').onclick = AppController.processPhase3;
                    document.getElementById('reset-phase3-btn').onclick = AppController.resetPhase3;
                    break;
                case 'phase4':
                    document.querySelectorAll('.path-nav-btn').forEach(btn => btn.onclick = e => AppController.handlePhase4PathChange(parseInt(e.currentTarget.dataset.pathIndex, 10)));
                    if (document.getElementById('phase4-base-amount-input')) {
                        const baseAmountInput = document.getElementById('phase4-base-amount-input');
                        const commitBaseAmount = () => AppController.handlePhase4BaseAmountChange(baseAmountInput.value);
                        baseAmountInput.onchange = commitBaseAmount;
                        baseAmountInput.onblur = commitBaseAmount;
                    }
                    if (document.getElementById('auto-suggest-phase4-btn')) document.getElementById('auto-suggest-phase4-btn').onclick = AppController.handlePhase4AutoSuggest;
                    document.getElementById('process-phase4-btn').onclick = AppController.processPhase4;
                    document.getElementById('reset-phase4-btn').onclick = AppController.resetPhase4;
                    this.attachDragAndDropListeners('phase4');
                    break;
                case 'phase5':
                    document.querySelectorAll('.path-nav-btn').forEach(btn => btn.onclick = e => AppController.handlePhase5PathChange(parseInt(e.currentTarget.dataset.pathIndex, 10)));
                    if (document.getElementById('phase5-order-mode-select')) document.getElementById('phase5-order-mode-select').onchange = e => AppController.handlePhase5OrderModeChange(e.target.value);
                    if (document.getElementById('base-amount-input')) {
                        const baseAmountInput = document.getElementById('base-amount-input');
                        const commitBaseAmount = () => AppController.handlePhase5BaseAmountChange(baseAmountInput.value);
                        baseAmountInput.onchange = commitBaseAmount;
                        baseAmountInput.onblur = commitBaseAmount;
                    }
                    if (document.getElementById('reevaluate-removals-btn')) document.getElementById('reevaluate-removals-btn').onclick = AppController.handlePhase5ReevaluateRemovals;
                    if (document.getElementById('auto-classify-btn')) document.getElementById('auto-classify-btn').onclick = AppController.handlePhase5AutoClassify;
                    document.getElementById('process-phase5-btn').onclick = () => AppController.processPhase5(false);
                    document.getElementById('reset-phase5-btn').onclick = AppController.resetPhase5;
                    this.attachDragAndDropListeners('phase5');
                    break;
            }
        },
        attachDragAndDropListeners(phase) {
            document.querySelectorAll('.draggable-item').forEach(item => {
                item.addEventListener('dragstart', e => e.dataTransfer.setData('text/plain', e.target.dataset.value));
            });
            document.querySelectorAll('.drop-zone').forEach(zone => {
                zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
                zone.addEventListener('dragleave', e => zone.classList.remove('drag-over'));
                zone.addEventListener('drop', e => {
                    e.preventDefault(); zone.classList.remove('drag-over');
                    const value = e.dataTransfer.getData('text/plain');
                    const toZoneId = zone.id;
                    if (phase === 'phase2') AppController.handlePhase2Drop(value, toZoneId);
                    if (phase === 'phase4') AppController.handlePhase4Drop(value, toZoneId);
                    if (phase === 'phase5') AppController.handlePhase5Drop(value, toZoneId);
                });
            });
        },
        renderPhase3View(source) {

            const pathNav = dataSets.length > 1 ? dataSets.map((set, index) => `<button data-path-index="${index}" class="path-nav-btn px-4 py-2 text-sm ${index === activePath ? 'active' : ''} ${source.phases.phase3.config[index]?.isComplete ? 'completed' : ''}">${set.name}</button>`).join('') : '';
            const prompts = [

                { key: 'stockQtyCol', text: '거래주식수' },

                { key: 'stockBalanceCol', text: '주식잔고' },

            }).join('');
            const tableHTML = this.generateTableHTML(currentData.slice(0, 10), {

                highlightMapping: {
                    'highlight-p3-dateCol': config.dateCol,
                    'highlight-p3-tradeTypeCol': config.tradeTypeCol,
                    'highlight-p3-amountCol': config.amountCol,
                    'highlight-p3-balanceCol': config.balanceCol,
                    'highlight-p3-feeCol': config.feeCol,
                    'highlight-p3-taxCol': config.taxCol,
                    'highlight-p3-extraCostCol1': config.extraCostCol1,
                    'highlight-p3-extraCostCol2': config.extraCostCol2,

                    'highlight-p3-additionalCol2': config.additionalCol2,

            });
            return `<div class="space-y-6"><header><h1 class="text-3xl font-bold text-slate-900">3단계: 매핑 및 적요 생성</h1></header><div class="flex border-b">${pathNav}</div><div class="flex flex-wrap items-center gap-3">${brokerChip}</div><p class="text-slate-600 mt-2">일자, 거래금액, 잔액, 거래종류, 수수료, 제세금, 기타비용 열을 먼저 지정하고 적요 생성에 필요한 항목을 함께 선택해주세요. 이 단계의 값은 제거와 입출금 분리에 자동 반영됩니다.</p><div class="grid grid-cols-2 md:grid-cols-4 gap-2">${selectionUI}</div><div class="flex items-center space-x-3 mt-4"><button id="process-phase3-btn" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">매핑 저장 & 다음으로</button><button id="reset-phase3-btn" class="px-4 py-2 bg-slate-500 text-white rounded-md hover:bg-slate-600">선택 초기화</button></div><div class="overflow-x-auto border rounded-lg bg-white shadow-sm">${tableHTML}</div></div>`;

        renderPhase4View(source) {

        renderPhase5View(source) {

            const { activePath } = source.phases.phase5;
            const currentData = dataSets[activePath]?.data;
            if (!currentData) return `<p>데이터를 불러오는 중 오류가 발생했습니다. 4단계로 돌아가 다시 시도해주세요.</p>`;
            const config = source.phases.phase5.config[activePath] || {};
            const pathNav = dataSets.length > 1 ? dataSets.map((set, index) => `<button data-path-index="${index}" class="path-nav-btn px-4 py-2 text-sm ${index === activePath ? 'active' : ''} ${source.phases.phase5.config[index]?.isComplete ? 'completed' : ''}">${set.name}</button>`).join('') : '';
            const mappingSummary = [
                ['일자', config.dateCol], ['거래종류', config.tradeTypeCol], ['거래금액', config.amountCol], ['잔액', config.balanceCol],
                ['적요', config.jukyoCol], ['수수료', config.feeCol], ['제세금', config.taxCol], ['기타비용1', config.extraCostCol1],
                ['기타비용2', config.extraCostCol2], ['기타비용3', config.extraCostCol3]
            ].map(([label, index]) => {
                const valueText = index !== undefined && currentData[0] ? `[${index + 1}열] ${currentData[0][index] ?? ''}` : '미선택';
                return `<div class="p-2 border rounded-md bg-slate-50"><label class="font-medium text-sm">${label}: </label><span class="font-bold text-indigo-600">${valueText}</span></div>`;
            }).join('');
            let tableHTML = this.generateTableHTML(currentData.slice(0, 10), { selectable: false });
            let dragDropUI = '';
            let removalUI = '';
            if (config.tradeTypeCol !== undefined) {
                const uniqueValues = [...new Set(currentData.slice(1).map(row => row[config.tradeTypeCol]).filter(Boolean))];
                const deposits = config.depositTypes || [];
                const withdrawals = config.withdrawalTypes || [];
                const sourceItems = uniqueValues.filter(v => !deposits.includes(v) && !withdrawals.includes(v));
                const removalItems = config.valuesToRemove || [];
                const removalSourceItems = uniqueValues.filter(v => !removalItems.includes(String(v)));
                const reevaluatedCount = (config.suggestedRemovals || []).length;
                const reevaluationText = reevaluatedCount > 0 ? `${reevaluatedCount}개 후보가 잔액 흐름 기준으로 다시 검토되었습니다.` : '4단계 후보를 바탕으로 최종 검토를 진행할 수 있습니다.';
                removalUI = `<div class="space-y-3"><div class="flex items-center space-x-4"><p class="text-slate-600 font-semibold">제거 후보 최종 확인</p><button id="reevaluate-removals-btn" class="px-3 py-1 bg-amber-400 text-amber-950 rounded-md hover:bg-amber-500 text-sm font-bold">잔액 기준 재검토</button></div><p class="text-sm text-slate-500">${reevaluationText}</p><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div class="p-4 rounded-lg bg-slate-100 border"><h3 class="font-semibold mb-2">전체 거래 종류</h3><div id="phase5-removal-source" class="drop-zone p-2 rounded flex flex-wrap gap-2">${removalSourceItems.map(val => `<div class="draggable-item bg-white px-3 py-1 rounded shadow-sm border" draggable="true" data-value="${val}">${val}</div>`).join('')}</div></div><div class="p-4 rounded-lg bg-white border"><h3 class="font-semibold mb-2 text-red-600">최종 제거 항목</h3><div id="phase5-removal-drop" class="drop-zone p-2 rounded flex flex-wrap gap-2">${removalItems.map(val => `<div class="draggable-item bg-red-100 px-3 py-1 rounded shadow-sm border" draggable="true" data-value="${val}">${val}</div>`).join('')}</div></div></div></div>`;
                dragDropUI = `<div class="flex items-center space-x-4"><p class="text-slate-600 font-semibold">거래 종류를 입금과 출금으로만 분리해주세요.</p><button id="auto-classify-btn" class="px-3 py-1 bg-yellow-400 text-yellow-900 rounded-md hover:bg-yellow-500 text-sm font-bold">잔액 기준 자동 분류</button></div><div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-2"><div class="p-4 rounded-lg bg-slate-100 border"><h3 class="font-semibold mb-2">거래 종류</h3><div id="source-items" class="drop-zone p-2 rounded flex flex-wrap gap-2">${sourceItems.map(val => `<div class="draggable-item bg-white px-3 py-1 rounded shadow-sm border" draggable="true" data-value="${val}">${val}</div>`).join('')}</div></div><div class="p-4 rounded-lg bg-white border"><h3 class="font-semibold mb-2 text-blue-600">입금 항목</h3><div id="drop-zone-deposit" class="drop-zone p-2 rounded flex flex-wrap gap-2">${deposits.map(val => `<div class="draggable-item bg-blue-100 px-3 py-1 rounded shadow-sm border" draggable="true" data-value="${val}">${val}</div>`).join('')}</div></div><div class="p-4 rounded-lg bg-white border"><h3 class="font-semibold mb-2 text-red-600">출금 항목</h3><div id="drop-zone-withdrawal" class="drop-zone p-2 rounded flex flex-wrap gap-2">${withdrawals.map(val => `<div class="draggable-item bg-red-100 px-3 py-1 rounded shadow-sm border" draggable="true" data-value="${val}">${val}</div>`).join('')}</div></div></div>`;
            }
            return `<div class="space-y-6"><header><h1 class="text-3xl font-bold text-slate-900">5단계: 입출금 분리</h1></header><div class="flex border-b">${pathNav}</div><p class="text-slate-600 mt-2">최종 매핑은 3단계에서 완료되었습니다. 여기서는 제거 후보를 마지막으로 확인하고 거래종류를 입금/출금으로만 나눠 최종 변환을 진행합니다.</p><div class="overflow-x-auto border rounded-lg bg-white shadow-sm my-4">${tableHTML}</div><div class="grid grid-cols-2 md:grid-cols-4 gap-2">${mappingSummary}</div><div><label class="font-medium text-sm">기초가액: </label><input id="base-amount-input" type="number" value="${config.baseAmount || 0}" class="p-2 border rounded-md"></div><div class="mt-4 space-y-4">${removalUI}${dragDropUI}</div><div class="flex items-center space-x-3 mt-4"><button id="process-phase5-btn" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">입출금 분리 완료 & 최종 변환</button><button id="reset-phase5-btn" class="px-4 py-2 bg-slate-500 text-white rounded-md hover:bg-slate-600">분류 초기화</button></div></div>`;
        },
        handlePhase5AutoClassify() {
            const source = AppState.getActiveSource();
            const { activePath } = source.phases.phase5;
            const config = source.phases.phase5.config[activePath] || {};
            const rawData = source.phases.phase4.output[activePath].data;
            const { result, error } = DataTransformer.autoDistributePhase5(rawData, config);
            if (error) {
                return UIRenderer.showModal('오류', error, [{ text: '확인', className: 'bg-indigo-600 text-white', onClick: () => UIRenderer.hideModal() }]);
            }
            AppController._updateActiveSource(s => {
                s.phases.phase5.config[activePath] = {
                    ...config,
                    valuesToRemove: result.valuesToRemove,
                    suggestedRemovals: result.suggestedRemovals,
                    depositTypes: result.depositTypes,
                    withdrawalTypes: result.withdrawalTypes,
                    inferredFeeMode: result.inferredFeeMode || config.inferredFeeMode || 'separate'
                };
                return s;
            });
            UIRenderer.showModal('알림', `자동 배분을 완료했습니다. 제거 후보 ${result.valuesToRemove.length}개, 입금 ${result.depositTypes.length}개, 출금 ${result.withdrawalTypes.length}개가 반영되었습니다.`, [{ text: '확인', className: 'bg-indigo-600 text-white', onClick: () => UIRenderer.hideModal() }]);
        },
        handlePhase5AutoClassify() {
            const source = AppState.getActiveSource();
            const { activePath } = source.phases.phase5;
            const config = source.phases.phase5.config[activePath] || {};
            const rawData = source.phases.phase4.output[activePath].data;
            const { result, error } = DataTransformer.autoDistributePhase5(rawData, config);
            if (error) {
                return UIRenderer.showModal('오류', error, [{ text: '확인', className: 'bg-indigo-600 text-white', onClick: () => UIRenderer.hideModal() }]);
            }
            AppController._updateActiveSource(s => {
                s.phases.phase5.config[activePath] = {
                    ...config,
                    valuesToRemove: result.valuesToRemove,
                    suggestedRemovals: result.suggestedRemovals,
                    depositTypes: result.depositTypes,
                    withdrawalTypes: result.withdrawalTypes,
                    inferredFeeMode: result.inferredFeeMode || config.inferredFeeMode || 'separate'
                };
                return s;
            });
            UIRenderer.showModal('알림', `자동 배분을 완료했습니다. 제거 후보 ${result.valuesToRemove.length}개, 입금 ${result.depositTypes.length}개, 출금 ${result.withdrawalTypes.length}개가 반영되었습니다.`, [{ text: '확인', className: 'bg-indigo-600 text-white', onClick: () => UIRenderer.hideModal() }]);
        },
    };

    // --- 3. 컨트롤러 (Controller / Actions) ---
    const AppController = {
        // --- Source Management ---
        handleFileUpload(event) {
            const files = Array.from(event.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = e => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        if (workbook.SheetNames.length > 1) {
                            workbook.SheetNames.forEach(sheetName => {
                                const worksheet = workbook.Sheets[sheetName];
                                const rawData = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: null });
                                AppController.addSource(`${file.name} / ${sheetName}`, rawData);
                            });
                        } else {
                            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                            const rawData = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: null });
                            AppController.addSource(file.name, rawData);
                        }
                    } catch (err) {
                        UIRenderer.showModal('파일 오류', `파일 '${file.name}'을(를) 읽는 중 오류가 발생했습니다.`, [{ text: '확인', className: 'bg-indigo-600 text-white', onClick: () => UIRenderer.hideModal() }]);
                    }
                };
                reader.readAsArrayBuffer(file);
            });
            event.target.value = ''; // Reset file input
        },
        handlePaste(event) {
            event.preventDefault();
            const text = (event.clipboardData || window.clipboardData).getData('text');
            const rawData = text.trim().split('\n').map(row => row.split('\t'));
            const sourceCount = AppState.getState().sources.filter(s => s.name.startsWith('증권계좌')).length;
            AppController.addSource(`증권계좌${sourceCount + 1}`, rawData);
            event.target.textContent = '';
        },
        createPhase2Group(name, marketType = 'foreign') {
            return { name, marketType, values: [] };
        },
        getDefaultPhase2Config() {
            return {
                splitCol: null,
                groups: [
                    AppController.createPhase2Group('국내', 'domestic'),
                    AppController.createPhase2Group('국외', 'foreign')
                ]
            };
        },
        normalizePhase2Groups(groups) {
            if (!Array.isArray(groups) || groups.length === 0) {
                return AppController.getDefaultPhase2Config().groups;
            }

            const normalized = groups.map((group, index) => ({
                name: group?.name || (index === 0 ? '국내' : `국외 ${index}`),
                marketType: group?.marketType || (index === 0 ? 'domestic' : 'foreign'),
                values: Array.isArray(group?.values) ? [...group.values] : []
            }));

            const isLegacySingleGroup = normalized.length === 1 && !groups[0]?.marketType;
            if (isLegacySingleGroup) {
                return AppController.getDefaultPhase2Config().groups;
            }

            return normalized;
        },
        addSource(name, rawData) {
            if (!rawData || rawData.length === 0 || rawData.flat().every(cell => cell === null)) {
                UIRenderer.showModal('알림', `'${name}'에 데이터가 없어 추가하지 않았습니다.`, [{ text: '확인', className: 'bg-indigo-600 text-white', onClick: () => UIRenderer.hideModal() }]);
                return;
            }
            const newSource = {
                id: `source_${Date.now()}_${Math.random()}`,
                name, rawData,
                status: 'pending',
                currentPhase: 'phase1',
                phases: {
                    phase1: { isComplete: false, config: { headerRows: [] }, output: null },
                    phase2: { isComplete: false, config: { splitCol: null, groups: [{name: '그룹 1', values: []}] }, output: [] },
                    phase3: { isComplete: false, config: {}, output: [], activePath: 0, selectingKey: null },
                    phase4: { isComplete: false, config: {}, output: [], removed: [], activePath: 0, selectingKey: null },
                    phase5: { isComplete: false, config: {}, output: [], activePath: 0, selectingKey: null },
                    download: { isComplete: false }
                }
            };
            newSource.phases.phase2.config = AppController.getDefaultPhase2Config();
            AppState.setState(state => ({ ...state, sources: [...state.sources, newSource] }));
        },
        setActiveSource(sourceId) {
            AppState.setState(state => {
                const newSources = state.sources.map(s => ({
                    ...s,
                    status: s.id === sourceId ? (s.status === 'completed' ? 'completed' : 'active') : (s.status === 'active' ? 'pending' : s.status)
                }));
                return { ...state, activeSourceId: sourceId, sources: newSources };
            });
        },
        deleteSource(sourceId) {
             UIRenderer.showModal('작업 삭제', `이 작업을 목록에서 삭제하시겠습니까?`,
                [
                    { text: '아니오', className: 'bg-slate-200 hover:bg-slate-300 text-slate-800', onClick: () => UIRenderer.hideModal() },
                    { text: '예 (삭제)', className: 'bg-red-600 hover:bg-red-700 text-white', onClick: () => {
                        AppState.setState(state => {
                            const newSources = state.sources.filter(s => s.id !== sourceId);
                            const newActiveSourceId = state.activeSourceId === sourceId ? null : state.activeSourceId;
                            return { ...state, sources: newSources, activeSourceId: newActiveSourceId };
                        });
                        UIRenderer.hideModal();
                    }}
                ]
            );
        },
        updateActiveSourceName(newName) {
            AppController._updateActiveSource(s => {
                s.name = newName;
                return s;
            });
        },
        completeActiveTask() {
            const activeSource = AppState.getActiveSource();
            if (!activeSource.phases.phase5.isComplete) {
                UIRenderer.showModal('알림', `모든 변환 단계를 완료해야 작업을 마칠 수 있습니다.`, [{ text: '확인', className: 'bg-indigo-600 text-white', onClick: () => UIRenderer.hideModal() }]);
                return;
            }
            AppState.setState(state => {
                const newSources = state.sources.map(s => {
                    if (s.id === state.activeSourceId) {
                        return { ...s, status: 'completed' };
                    }
                    return s;
                });
                return { ...state, activeSourceId: null, sources: newSources };
            });
        },
        resetActiveSource() {
             AppState.setState(state => {
                const newSources = state.sources.map(s => {
                    if (s.id === state.activeSourceId) {
                        // Return a new object with reset phase data
                        return {
                            ...s,
                            currentPhase: 'phase1',
                            phases: {
                                phase1: { isComplete: false, config: { headerRows: [] }, output: null },
                                phase2: { isComplete: false, config: { splitCol: null, groups: [{name: '그룹 1', values: []}] }, output: [] },
                                phase3: { isComplete: false, config: {}, output: [], activePath: 0, selectingKey: null },
                                phase4: { isComplete: false, config: {}, output: [], removed: [], activePath: 0, selectingKey: null },
                                phase5: { isComplete: false, config: {}, output: [], activePath: 0, selectingKey: null },
                                download: { isComplete: false }
                            }
                        };
                    }
                    return s;
                });
                return { ...state, sources: newSources };
            });
        },
        
        // --- Phase Logic (Delegates to source-specific state) ---
        _updateActiveSource(updater) {
            AppState.setState(state => {
                const newSources = state.sources.map(s => {
                    if (s.id === state.activeSourceId) {
                        return updater(s);
                    }
                    return s;
                });
                return { ...state, sources: newSources };
            });
        },
        
        navigate(phase) { AppController._updateActiveSource(s => ({...s, currentPhase: phase})); },
        handlePhase1RowSelect(rowIndex) { AppController._updateActiveSource(s => { const currentSelection = s.phases.phase1.config.headerRows; const newSelection = currentSelection.includes(rowIndex) ? currentSelection.filter(r => r !== rowIndex) : [...currentSelection, rowIndex].sort((a, b) => a - b); s.phases.phase1.config.headerRows = newSelection; return s; }); },
        resetPhase1() { AppController._updateActiveSource(s => { s.phases.phase1.config.headerRows = []; return s; }); },
        processPhase1() {
            const source = AppState.getActiveSource();
            const { rawData } = source;
            const { headerRows } = source.phases.phase1.config;
            if (headerRows.length === 0) return UIRenderer.showModal('알림', '최소 1개 이상의 행을 선택해야 합니다.', [{ text: '확인', className: 'bg-indigo-600 text-white', onClick: () => UIRenderer.hideModal() }]);
            
            let result = DataTransformer.transformPhase1(rawData, headerRows);
            result = DataTransformer.autoSortByDate(result);
            
            AppController._updateActiveSource(s => {
                s.currentPhase = 'phase2';
                s.phases.phase1.isComplete = true;
                s.phases.phase1.output = result;
                s.phases.phase2.isComplete = false;
                s.phases.phase2.config = AppController.getDefaultPhase2Config();
                s.phases.phase2.config = { splitCol: null, groups: [{name: '그룹 1', values: []}] };
                return s;
            });
        },
        handlePhase2ColSelect(colIndex) { AppController._updateActiveSource(s => { s.phases.phase2.config.splitCol = colIndex; return s; }); },
        handlePhase2AddGroup() { AppController._updateActiveSource(s => { const groups = AppController.normalizePhase2Groups(s.phases.phase2.config.groups); const nextIndex = groups.filter(group => group.marketType === 'foreign').length + 1; groups.push(AppController.createPhase2Group(`국외 ${nextIndex}`, 'foreign')); s.phases.phase2.config.groups = groups; return s; }); },
        handlePhase2GroupNameChange(index, newName) { AppController._updateActiveSource(s => { const groups = AppController.normalizePhase2Groups(s.phases.phase2.config.groups); if (groups[index]) groups[index].name = newName; s.phases.phase2.config.groups = groups; return s; }); },
        handlePhase2GroupTypeChange(index, marketType) { AppController._updateActiveSource(s => { const groups = AppController.normalizePhase2Groups(s.phases.phase2.config.groups); if (groups[index]) groups[index].marketType = marketType; s.phases.phase2.config.groups = groups; return s; }); },
        handlePhase2Drop(value, toZoneId) { AppController._updateActiveSource(s => { const groups = AppController.normalizePhase2Groups(s.phases.phase2.config.groups); groups.forEach(g => g.values = g.values.filter(v => v !== value)); const zoneIndex = parseInt(toZoneId.replace('drop-zone-', ''), 10); if (!isNaN(zoneIndex) && groups[zoneIndex] && !groups[zoneIndex].values.includes(value)) { groups[zoneIndex].values.push(value); } s.phases.phase2.config.groups = groups; return s; }); },
        processPhase2() {
            const source = AppState.getActiveSource();
            const data = source.phases.phase1.output;
            const { splitCol } = source.phases.phase2.config;
            const groups = AppController.normalizePhase2Groups(source.phases.phase2.config.groups);
            const result = DataTransformer.transformPhase2(data, splitCol, groups).map((dataSet, index) => ({
                ...dataSet,
                marketType: groups[index]?.marketType || null
            }));
            if (splitCol !== null && result.length === 0) {
                return UIRenderer.showModal('알림', '선택된 기준으로 데이터를 분리할 수 없습니다. 그룹에 포함된 값이 실제 데이터와 일치하는지 확인해주세요.', [{ text: '확인', className: 'bg-indigo-600 text-white', onClick: () => UIRenderer.hideModal() }]);
            }
            AppController._updateActiveSource(s => {
                s.currentPhase = 'phase3';
                s.phases.phase2.isComplete = true;
                s.phases.phase2.output = result;
                s.phases.phase3.isComplete = false;
                s.phases.phase3.config = Object.fromEntries(result.map((dataSet, index) => [index, BrokerAutoMapper.buildPhase3Config(dataSet, source.name)]));
                s.phases.phase3.activePath = 0;
                return s;
            });
        },
        handlePhase3PathChange(pathIndex) { AppController._updateActiveSource(s => { s.phases.phase3.activePath = pathIndex; s.phases.phase3.selectingKey = null; return s; }); },
        handlePhase3KeySelect(key) { AppController._updateActiveSource(s => { s.phases.phase3.selectingKey = key; return s; }); },
        handlePhase3ColSelect(colIndex) { AppController._updateActiveSource(s => { const { activePath, selectingKey } = s.phases.phase3; if (!selectingKey) return s; s.phases.phase3.config[activePath] = s.phases.phase3.config[activePath] || {}; s.phases.phase3.config[activePath][selectingKey] = colIndex; s.phases.phase3.selectingKey = null; return s; }); },
        resetPhase3() { AppController._updateActiveSource(s => { const activePath = s.phases.phase3.activePath; const dataSet = s.phases.phase2.output?.[activePath]; s.phases.phase3.config[activePath] = BrokerAutoMapper.buildPhase3Config(dataSet, s.name); return s; }); },
        processPhase3() {
            AppController._updateActiveSource(s => {
                const { activePath } = s.phases.phase3;
                const dataSets = s.phases.phase2.output;
                const currentConfig = s.phases.phase3.config[activePath];
                if (!currentConfig) {
                    UIRenderer.showModal('알림', '현재 통화의 열을 먼저 선택해주세요.', [{ text: '확인', className: 'bg-indigo-600 text-white', onClick: () => UIRenderer.hideModal() }]);
                    return s;
                }
                currentConfig.isComplete = true;
                const allPathsCompleted = dataSets.every((_, index) => s.phases.phase3.config[index]?.isComplete);
                if (allPathsCompleted) {
                    s.phases.phase3.output = dataSets.map((dataSet, index) => ({ ...dataSet, data: DataTransformer.transformPhase3(dataSet.data, s.phases.phase3.config[index]) }));
                    s.phases.phase3.isComplete = true;
                    s.currentPhase = 'phase4';
                    s.phases.phase4.isComplete = false;
                    s.phases.phase4.config = Object.fromEntries(dataSets.map((_, index) => {
                        const phase3Config = s.phases.phase3.config[index] || {};
                        return [index, {
                            tradeTypeCol: phase3Config.tradeTypeCol,
                            baseAmount: 0,
                            valuesToRemove: [],
                            suggestedRemovals: []
                        }];
                    }));
                    s.phases.phase4.activePath = 0;
                    s.phases.phase4.selectingKey = null;
                } else {
                    s.phases.phase3.activePath = dataSets.findIndex((_, index) => !s.phases.phase3.config[index]?.isComplete);
                }
                return s;

    // --- 4. 데이터 변환 로직 (Data Transformer) ---
    AppController.handlePhase5AutoClassify = function() {

            };

    };

    const DataTransformer = {
        validatePhase5Config(config) {
            const requiredFields = [
                { key: 'dateCol', label: '일자' },
                { key: 'amountCol', label: '거래금액' },
                { key: 'balanceCol', label: '잔액' },

                { key: 'jukyoCol', label: '적요' }

            const missing = requiredFields.filter(field => config[field.key] === undefined).map(field => field.label);
            if (missing.length > 0) {

            }

        },
        _toNumber(value) {
            if (value === null || value === undefined || String(value).trim() === '') return null;
            const num = parseFloat(String(value).replace(/,/g, ''));
            return Number.isNaN(num) ? null : num;
        },
        _getRowValues(row, config) {
            const getValue = (key) => (config[key] === undefined || row[config[key]] === null || row[config[key]] === undefined) ? "" : row[config[key]];
            return {
                tradeType: String(getValue('tradeTypeCol') || '').trim(),
                amount: this._toNumber(getValue('amountCol')) || 0,
                fee: this._toNumber(getValue('feeCol')) || 0,
                tax: this._toNumber(getValue('taxCol')) || 0,

            };
        },
        _buildCashflowCandidates(rowInfo) {
            const { amount, fee, tax } = rowInfo;
            return [
                { mode: 'amountOnly', direction: 'deposit', delta: amount },
                { mode: 'amountOnly', direction: 'withdrawal', delta: -amount },
                { mode: 'feeIncluded', direction: 'deposit', delta: amount - fee - tax },
                { mode: 'feeIncluded', direction: 'withdrawal', delta: -(amount + fee + tax) }
            ];
        },
        _inferDirectionFromText(text) {
            const normalized = String(text || '').toLowerCase();
            const depositKeywords = ['매도', '입금', '배당', '환급', '입고', '이입'];
            const withdrawalKeywords = ['매수', '출금', '출고', '수수료', '세금', '제출', '이체'];
            if (depositKeywords.some(keyword => normalized.includes(keyword))) return 'deposit';
            if (withdrawalKeywords.some(keyword => normalized.includes(keyword))) return 'withdrawal';
            return null;
        },
        suggestPhase4Removals(data, config) {
            const requiredFields = [
                { key: 'tradeTypeCol', label: '거래종류' },
                { key: 'amountCol', label: '거래금액' },
                { key: 'balanceCol', label: '예수금잔액' }
            ];
            const missing = requiredFields.filter(field => config[field.key] === undefined).map(field => field.label);
            if (missing.length > 0) {
                return { result: null, error: `${missing.join(', ')} 열을 먼저 선택해주세요.` };
            }
            const body = data.slice(1);
            if (body.length === 0) {
                return { result: { valuesToRemove: [], suggestedRemovals: [] }, error: null };
            }

            const keywordWeights = [
                { keyword: '수수료', weight: 3.5 },
                { keyword: '세금', weight: 3.5 },
                { keyword: '제세', weight: 3.5 },
                { keyword: '출금', weight: 2.5 },
                { keyword: '이체', weight: 2.5 },
                { keyword: '대체', weight: 2.2 },
                { keyword: '정산', weight: 2.2 },
                { keyword: '환전', weight: 2.0 },
                { keyword: '입금', weight: 1.3 },
                { keyword: '매수', weight: 0.8 },
                { keyword: '매도', weight: 0.8 },
                { keyword: '출고', weight: 0.4 },
                { keyword: '입고', weight: 0.4 }
            ];
            const stats = {};
            let prevBalance = config.baseAmount || 0;
            let observedRows = 0;

            body.forEach(row => {
                const tradeType = String(row[config.tradeTypeCol] || '').trim();
                const amount = Math.abs(this._toNumber(row[config.amountCol]) || 0);
                const balance = this._toNumber(row[config.balanceCol]);
                if (!tradeType || balance === null) {
                    if (balance !== null) prevBalance = balance;
                    return;
                }
                const observedDelta = balance - prevBalance;
                prevBalance = balance;
                observedRows += 1;
                stats[tradeType] = stats[tradeType] || { keepError: 0, removeError: 0, rows: 0, keywordWeight: 1 };
                stats[tradeType].rows += 1;
                stats[tradeType].keepError += Math.min(Math.abs(observedDelta - amount), Math.abs(observedDelta + amount));
                stats[tradeType].removeError += Math.abs(observedDelta);
            });

            const suggestedRemovals = Object.entries(stats).filter(([tradeType, tradeStats]) => {
                const normalized = tradeType.toLowerCase();
                const weight = keywordWeights.reduce((maxWeight, entry) => normalized.includes(entry.keyword) ? Math.max(maxWeight, entry.weight) : maxWeight, 1);
                tradeStats.keywordWeight = weight;
                const adjustedRemoveError = tradeStats.removeError / weight;
                if (tradeStats.rows === 0) return false;
                if (tradeStats.keepError === 0 && adjustedRemoveError > 0) return false;
                return adjustedRemoveError + 1 < tradeStats.keepError;
            }).sort((a, b) => {
                const scoreA = (a[1].keepError - (a[1].removeError / a[1].keywordWeight));
                const scoreB = (b[1].keepError - (b[1].removeError / b[1].keywordWeight));
                return scoreB - scoreA;
            }).map(([tradeType]) => tradeType);

            if (suggestedRemovals.length === 0 && observedRows > 0) {
                UIRenderer.showModal('알림', '잔액 흐름을 기준으로 제거 후보를 추론했지만 확신이 높은 항목을 찾지 못했습니다. 수동으로 확인해주세요.', [{ text: '확인', className: 'bg-indigo-600 text-white', onClick: () => UIRenderer.hideModal() }]);
            } else if (suggestedRemovals.length > 0) {
                UIRenderer.showModal('알림', `${suggestedRemovals.length}개 거래종류를 제거 추천으로 반영했습니다. 추천 결과는 드래그해서 자유롭게 수정할 수 있습니다.`, [{ text: '확인', className: 'bg-indigo-600 text-white', onClick: () => UIRenderer.hideModal() }]);
            }

            return {
                result: {
                    valuesToRemove: suggestedRemovals,
                    suggestedRemovals
                },
                error: null
            };
        },
        suggestPhase5Removals(data, config) {
            const requiredFields = [
                { key: 'dateCol', label: '일자' },
                { key: 'tradeTypeCol', label: '거래종류' },
                { key: 'amountCol', label: '거래금액' },
                { key: 'balanceCol', label: '예수금잔액' },
                { key: 'jukyoCol', label: '적요' }
            ];
            const missing = requiredFields.filter(field => config[field.key] === undefined).map(field => field.label);
            if (missing.length > 0) {
                return { result: null, error: `${missing.join(', ')} 열을 먼저 선택해주세요.` };
            }

            const body = data.slice(1);
            if (body.length === 0) {
                return { result: { valuesToRemove: config.valuesToRemove || [], suggestedRemovals: [] }, error: null };
            }

            const grouped = {};
            let prevBalance = config.baseAmount || 0;
            const feeTolerance = 20;

            body.forEach(row => {
                const tradeType = String(row[config.tradeTypeCol] || '').trim();
                const balance = this._toNumber(row[config.balanceCol]);
                const amount = Math.abs(this._toNumber(row[config.amountCol]) || 0);
                const fee = Math.abs(this._toNumber(config.feeCol !== undefined ? row[config.feeCol] : null) || 0);
                const tax = Math.abs(this._toNumber(config.taxCol !== undefined ? row[config.taxCol] : null) || 0);
                if (!tradeType || balance === null) {
                    if (balance !== null) prevBalance = balance;
                    return;
                }
                const observedDelta = balance - prevBalance;
                prevBalance = balance;
                const dateKey = config.dateCol !== undefined ? String(row[config.dateCol] || '') : '';
                const memoKey = config.jukyoCol !== undefined ? String(row[config.jukyoCol] || '') : '';
                const groupKey = `${tradeType}__${dateKey}__${memoKey}`;
                grouped[groupKey] = grouped[groupKey] || { tradeType, observedDelta: 0, amount: 0, fee: 0, tax: 0, count: 0 };
                grouped[groupKey].observedDelta += observedDelta;
                grouped[groupKey].amount += amount;
                grouped[groupKey].fee += fee;
                grouped[groupKey].tax += tax;
                grouped[groupKey].count += 1;
            });

            const typeScores = {};
            Object.values(grouped).forEach(group => {
                const candidates = [
                    group.amount,
                    -group.amount,
                    group.amount - group.fee - group.tax,
                    -(group.amount + group.fee + group.tax),
                    group.amount + group.fee,
                    -(group.amount + group.fee),
                    group.amount - group.tax,
                    -(group.amount + group.tax)
                ];
                const keepError = Math.min(...candidates.map(delta => {
                    const diff = Math.abs(group.observedDelta - delta);
                    return diff <= feeTolerance ? diff * 0.5 : diff;
                }));
                const removeError = Math.abs(group.observedDelta);
                typeScores[group.tradeType] = typeScores[group.tradeType] || { keepError: 0, removeError: 0, count: 0 };
                typeScores[group.tradeType].keepError += keepError;
                typeScores[group.tradeType].removeError += removeError;
                typeScores[group.tradeType].count += 1;
            });

            const recommended = Object.entries(typeScores)
                .filter(([, score]) => score.count > 0 && score.removeError + 1 < score.keepError)
                .sort((a, b) => (b[1].keepError - b[1].removeError) - (a[1].keepError - a[1].removeError))
                .map(([tradeType]) => tradeType);

            const merged = [...new Set([...(config.valuesToRemove || []), ...recommended])];
            if (recommended.length > 0) {
                UIRenderer.showModal('알림', `${recommended.length}개 항목을 잔액 흐름 기준으로 다시 제거 후보에 반영했습니다. 필요하면 직접 수정해주세요.`, [{ text: '확인', className: 'bg-indigo-600 text-white', onClick: () => UIRenderer.hideModal() }]);
